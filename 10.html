    <script>
        // --- SIDEBAR DRAWER INTERFACES ---
        const menuToggle = document.getElementById('menuToggle');
        const closeMenu = document.getElementById('closeMenu');
        const sidebar = document.getElementById('sidebar');
        const menuOverlay = document.getElementById('menuOverlay');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.add('active');
            menuOverlay.classList.add('active');
        });

        const hideMenuHub = () => {
            sidebar.classList.remove('active');
            menuOverlay.classList.remove('active');
        };

        closeMenu.addEventListener('click', hideMenuHub);
        menuOverlay.addEventListener('click', hideMenuHub);

        // --- ACCORDION TOGGLE MECHANICS ---
        const accordionToggle = document.getElementById('accordionToggle');
        const stepsPanel = document.getElementById('stepsPanel');
        const arrowIcon = document.getElementById('arrowIcon');

        accordionToggle.addEventListener('click', () => {
            toggleAccordion();
        });

        function toggleAccordion(forceOpen = false) {
            if (stepsPanel.classList.contains('open') && !forceOpen) {
                stepsPanel.classList.remove('open');
                stepsPanel.style.maxHeight = null;
                arrowIcon.textContent = "▼";
            } else {
                stepsPanel.classList.add('open');
                stepsPanel.style.maxHeight = stepsPanel.scrollHeight + "px";
                arrowIcon.textContent = "▲";
            }
        }

        // --- CALCULATOR COMPUTATIONAL SYSTEM ENGINE ---
        const expressionView = document.getElementById('expressionView');
        const resultView = document.getElementById('resultView');
        const stepsBox = document.getElementById('stepsBox');
        const calcContainer = document.getElementById('calcContainer');

        let currentInputString = "";
        let isEvaluatedState = false;

        document.querySelectorAll('.calc-btn').forEach(button => {
            button.addEventListener('click', () => {
                const char = button.getAttribute('data-char');
                const action = button.getAttribute('data-action');
                
                if (char) handleCharacterInput(char);
                if (action === 'clear') resetCalculator();
                if (action === 'evaluate') processCalculation();
            });
        });

        function handleCharacterInput(char) {
            const operators = ['+', '-', '×', '÷'];
            
            if (isEvaluatedState) {
                if (operators.includes(char)) {
                    // Seed new continuous operations chain from current result value
                    currentInputString = resultView.textContent + char;
                } else {
                    currentInputString = char;
                }
                isEvaluatedState = false;
            } else {
                // Safeguard against entering double concurrent operators sequentially
                if (operators.includes(char) && operators.includes(currentInputString.slice(-1))) {
                    currentInputString = currentInputString.slice(0, -1) + char;
                } else {
                    currentInputString += char;
                }
            }
            resultView.textContent = currentInputString || "0";
            expressionView.textContent = ""; 
        }

        function resetCalculator() {
            currentInputString = "";
            isEvaluatedState = false;
            resultView.textContent = "0";
            expressionView.textContent = "";
            stepsBox.innerHTML = "Input arithmetic equations and click '=' to map computational logic sequences.";
            if (stepsPanel.classList.contains('open')) {
                stepsPanel.style.maxHeight = stepsPanel.scrollHeight + "px";
            }
        }

        function processCalculation() {
            if (!currentInputString) return;

            // Handle hanging operators at the very end cleanly
            if (['+', '-', '×', '÷'].includes(currentInputString.slice(-1))) {
                currentInputString = currentInputString.slice(0, -1);
            }

            try {
                // Parse out localized operational symbols into native computing format strings
                let evaluationFormula = currentInputString.replace(/×/g, '*').replace(/÷/g, '/');
                
                // Mathematical expression tokenization configuration validation
                if (!/^[0-9.+\-*/\s]+$/.test(evaluationFormula)) throw new Error("Invalid Syntax");

                // Execute safe structural parsing sequence logic array mapping execution sequences
                let tokens = evaluationFormula.match(/(\d+(\.\d+)?)|[+\-*/]/g);
                if (!tokens) throw new Error("Parse Failure");

                let breakdownStepsHtml = `<span style="color: #00ff87; font-weight: bold;">[Decimal Operational Execution Trace Log]</span><br><br>`;
                breakdownStepsHtml += `Initial Expression: <strong>${currentInputString}</strong><br><br>`;

                // Track and trace computational transformations step-by-step sequential processing 
                let intermediateSteps = [];
                let sequentialSequence = [...tokens];

                // Pass 1: Handle high precedence rules sequentially (Multiplication & Division) from Left to Right
                for (let i = 0; i < sequentialSequence.length; i++) {
                    if (sequentialSequence[i] === '*' || sequentialSequence[i] === '/') {
                        let leftOperand = parseFloat(sequentialSequence[i - 1]);
                        let rightOperand = parseFloat(sequentialSequence[i + 1]);
                        let operator = sequentialSequence[i];
                        let partialResult = 0;

                        if (operator === '*') partialResult = leftOperand * rightOperand;
                        if (operator === '/') {
                            if (rightOperand === 0) throw new Error("Division By Zero Error");
                            partialResult = leftOperand / rightOperand;
                        }

                        let humanOperator = operator === '*' ? '×' : '÷';
                        intermediateSteps.push(`➔ ${leftOperand} ${humanOperator} ${rightOperand} = <strong>${partialResult}</strong>`);
                        
                        // Replace evaluated parameters back inside context stack arrays
                        sequentialSequence.splice(i - 1, 3, partialResult.toString());
                        i--; // Re-index array positioning matrices pointers
                    }
                }

                // Pass 2: Handle remaining structural updates sequentially (Addition & Subtraction)
                for (let i = 0; i < sequentialSequence.length; i++) {
                    if (sequentialSequence[i] === '+' || sequentialSequence[i] === '-') {
                        let leftOperand = parseFloat(sequentialSequence[i - 1]);
                        let rightOperand = parseFloat(sequentialSequence[i + 1]);
                        let operator = sequentialSequence[i];
                        let partialResult = 0;

                        if (operator === '+') partialResult = leftOperand + rightOperand;
                        if (operator === '-') partialResult = leftOperand - rightOperand;

                        intermediateSteps.push(`➔ ${leftOperand} ${operator} ${rightOperand} = <strong>${partialResult}</strong>`);
                        
                        sequentialSequence.splice(i - 1, 3, partialResult.toString());
                        i--;
                    }
                }

                let finalComputedOutcome = parseFloat(sequentialSequence[0]);
                if (isNaN(finalComputedOutcome)) throw new Error("Calculation Mismatch");

                // Update UI display screens elements structures configurations
                expressionView.textContent = currentInputString;
                resultView.textContent = finalComputedOutcome;

                // Push traced operation arrays directly inside HTML outputs blocks
                if (intermediateSteps.length > 0) {
                    breakdownStepsHtml += `Sequential Order of Operations (PEMDAS/BODMAS):<br>` + intermediateSteps.join('<br>') + `<br><br>`;
                } else {
                    breakdownStepsHtml += `➔ Single value state detected. No complex operations required.<br><br>`;
                }
                breakdownStepsHtml += `Final Resolved Output Valuation: <strong>${finalComputedOutcome}<sub>10}</strong>`;
                
                stepsBox.innerHTML = breakdownStepsHtml;
                isEvaluatedState = true;

                // Trigger smooth expanded tracking views sequences
                toggleAccordion(true);

            } catch (err) {
                // UI Interface error handling notification system flash routines
                calcContainer.classList.add('invalid-flash');
                resultView.style.color = '#ef4444';
                resultView.textContent = err.message === "Division By Zero Error" ? "Zero Division" : "Error";
                stepsBox.innerHTML = `<span style="color: #ef4444; font-weight: bold;">[Compilation Fault Traceback]</span><br><br>➔ Computation sequence aborted. Reason: ${err.message}. Please input a syntactically accurate continuous operation stream.`;
                
                setTimeout(() => {
                    calcContainer.classList.remove('invalid-flash');
                }, 4000);
                
                setTimeout(() => {
                     resultView.style.color = '#fff';
                     resetCalculator();
                }, 1500);
            }
        }
    </script>
