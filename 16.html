    <div class="calculator-card" id="calcContainer">

    <script>
        // --- SIDEBAR DRAWER INTERFACES ---
        const menuToggle = document.getElementById('menuToggle');
        const closeMenu = document.getElementById('closeMenu');
        const sidebar = document.getElementById('sidebar');
        const menuOverlay = document.getElementById('menuOverlay');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.add('active');
            menuOverlay.classList.add('active');
        });

        const hideMenuHub = () => {
            sidebar.classList.remove('active');
            menuOverlay.classList.remove('active');
        };

        closeMenu.addEventListener('click', hideMenuHub);
        menuOverlay.addEventListener('click', hideMenuHub);

        // --- ACCORDION TOGGLE MECHANICS ---
        const accordionToggle = document.getElementById('accordionToggle');
        const stepsPanel = document.getElementById('stepsPanel');
        const arrowIcon = document.getElementById('arrowIcon');

        accordionToggle.addEventListener('click', () => {
            if (window.innerWidth < 992) {
                toggleAccordion();
            }
        });

        function toggleAccordion(forceOpen = false) {
            // PC එකේදී accordion එක collapse වීම වැළැක්වීම
            if (window.innerWidth >= 992) {
                stepsPanel.classList.add('open');
                stepsPanel.style.maxHeight = "none";
                return;
            }

            if (stepsPanel.classList.contains('open') && !forceOpen) {
                stepsPanel.classList.remove('open');
                stepsPanel.style.maxHeight = null;
                arrowIcon.textContent = "▼";
            } else {
                stepsPanel.classList.add('open');
                stepsPanel.style.maxHeight = stepsPanel.scrollHeight + "px";
                arrowIcon.textContent = "▲";
            }
        }

        // --- HEXADECIMAL MULTI-CHAIN COMPUTATIONAL ENGINE ---
        const expressionView = document.getElementById('expressionView');
        const resultView = document.getElementById('resultView');
        const stepsBox = document.getElementById('stepsBox');
        const calcContainer = document.getElementById('calcContainer');

        let currentInputString = "";
        let isEvaluatedState = false;

        document.querySelectorAll('.calc-btn').forEach(button => {
            button.addEventListener('click', () => {
                const char = button.getAttribute('data-char');
                const action = button.getAttribute('data-action');
                
                if (char) handleCharacterInput(char);
                if (action === 'clear') resetCalculator();
                if (action === 'evaluate') processCalculation();
            });
        });

        function handleCharacterInput(char) {
            const operators = ['+', '-'];
            
            if (isEvaluatedState) {
                if (operators.includes(char)) {
                    currentInputString = resultView.textContent + char;
                } else {
                    currentInputString = char;
                }
                isEvaluatedState = false;
            } else {
                if (operators.includes(char) && operators.includes(currentInputString.slice(-1))) {
                    currentInputString = currentInputString.slice(0, -1) + char;
                } else {
                    currentInputString += char;
                }
            }
            resultView.textContent = currentInputString || "0";
            expressionView.textContent = ""; 
        }

        function resetCalculator() {
            currentInputString = "";
            isEvaluatedState = false;
            resultView.textContent = "0";
            expressionView.textContent = "";
            stepsBox.innerHTML = "Input hex equations (e.g., ACD8+9BEF) and click '=' to generate the textbook logic sequence trace matrix.";
            if (stepsPanel.classList.contains('open') && window.innerWidth < 992) {
                stepsPanel.style.maxHeight = stepsPanel.scrollHeight + "px";
            }
        }

        function processCalculation() {
            if (!currentInputString) return;

            if (['+', '-'].includes(currentInputString.slice(-1))) {
                currentInputString = currentInputString.slice(0, -1);
            }

            try {
                let tokens = currentInputString.match(/([0-9A-Fa-f]+)|([\+\-])/g);
                if (!tokens || tokens.length < 3) throw new Error("Syntax Error: Complete operation required");

                let htmlFinalTrace = "";
                let currentAccumulatorValue = tokens[0].toUpperCase();

                for (let i = 1; i < tokens.length; i += 2) {
                    let operator = tokens[i];
                    let nextOperand = tokens[i+1].toUpperCase();
                    
                    if (!nextOperand) break;

                    let stepTrace = generateHexEvaluationTrace(currentAccumulatorValue, nextOperand, operator, (i + 1) / 2);
                    htmlFinalTrace += stepTrace.html;
                    currentAccumulatorValue = stepTrace.result;
                    
                    if (i + 2 < tokens.length) {
                        htmlFinalTrace += `<div class="step-divider"></div>`;
                    }
                }

                expressionView.textContent = currentInputString.toUpperCase();
                resultView.textContent = currentAccumulatorValue;
                stepsBox.innerHTML = htmlFinalTrace;

                isEvaluatedState = true;
                toggleAccordion(true);

            } catch (err) {
                calcContainer.classList.add('invalid-flash');
                resultView.style.color = '#ef4444';
                resultView.textContent = "Error";
                stepsBox.innerHTML = `<span style="color: #ef4444; font-weight: bold;">[Computation Fault Traceback]</span><br><br>➔ Sequence aborted. Reason: ${err.message}.`;
                
                setTimeout(() => { calcContainer.classList.remove('invalid-flash'); }, 4000);
                setTimeout(() => { resultView.style.color = '#fff'; resetCalculator(); }, 1500);
            }
        }

        function generateHexEvaluationTrace(op1Str, op2Str, operator, stepNumber) {
            let dec1 = parseInt(op1Str, 16);
            let dec2 = parseInt(op2Str, 16);
            let resultDec = 0;

            if (operator === '+') resultDec = dec1 + dec2;
            if (operator === '-') {
                resultDec = dec1 - dec2;
                if (resultDec < 0) throw new Error("Negative Hexadecimal Outputs Unhandled");
            }

            let resultHexStr = resultDec.toString(16).toUpperCase();
            let maxLength = Math.max(op1Str.length, op2Str.length, resultHexStr.length);
            
            let paddedOp1 = op1Str.padStart(maxLength, '0');
            let paddedOp2 = op2Str.padStart(maxLength, '0');
            let paddedRes = resultHexStr.padStart(maxLength, '0');

            let html = `<span style="color: #00ff87; font-weight: bold;">[Step ${stepNumber}: Evaluation Trace for ${op1Str} ${operator} ${op2Str}]</span><br><br>`;
            
            let colPlaceValues = [];
            let colPowers = [];
            let carryRow = Array(maxLength).fill(0);
            let intermediateSumRow = Array(maxLength).fill(0); 
            let subLogicNotes = [];
            let bubbleRow = Array(maxLength).fill(false); 

            if (operator === '+') {
                let currentCarry = 0;
                for (let i = maxLength - 1; i >= 0; i--) {
                    let idx = maxLength - 1 - i;
                    colPlaceValues.unshift(Math.pow(16, idx));
                    colPowers.unshift(`16<sup>${idx}</sup>`);

                    let bit1 = parseInt(paddedOp1[i], 16) || 0;
                    let bit2 = parseInt(paddedOp2[i], 16) || 0;
                    let colSum = bit1 + bit2 + currentCarry;
                    intermediateSumRow[i] = colSum;

                    let hexChar1 = paddedOp1[i];
                    let hexChar2 = paddedOp2[i];

                    if (colSum >= 16) {
                        let nextCarry = Math.floor(colSum / 16);
                        if (i > 0) carryRow[i - 1] = nextCarry;
                        bubbleRow[i] = true;
                        subLogicNotes.unshift(`Column ${idx} (16<sup>${idx}</sup>): ${hexChar1}(${bit1}) + ${hexChar2}(${bit2}) ${currentCarry ? '+ ' + currentCarry + ' (carry)' : ''} = ${colSum} ➔ <span class="badge-sub">-16</span> ➔ Keeps ${colSum % 16} (${(colSum % 16).toString(16).toUpperCase()}), Carries ${nextCarry}`);
                        currentCarry = nextCarry;
                    } else {
                        subLogicNotes.unshift(`Column ${idx} (16<sup>${idx}</sup>): ${hexChar1}(${bit1}) + ${hexChar2}(${bit2}) ${currentCarry ? '+ ' + currentCarry + ' (carry)' : ''} = ${colSum} ➔ Keeps ${colSum} (${colSum.toString(16).toUpperCase()})`);
                        currentCarry = 0;
                    }
                }
            } else {
                let borrow = 0;
                for (let i = maxLength - 1; i >= 0; i--) {
                    let idx = maxLength - 1 - i;
                    colPlaceValues.unshift(Math.pow(16, idx));
                    colPowers.unshift(`16<sup>${idx}</sup>`);

                    let bit1 = parseInt(paddedOp1[i], 16) - borrow;
                    let bit2 = parseInt(paddedOp2[i], 16);

                    let hexChar1 = paddedOp1[i];
                    let hexChar2 = paddedOp2[i];

                    if (bit1 < bit2) {
                        subLogicNotes.unshift(`Column ${idx} (16<sup>${idx}</sup>): Borrow 16 from left column ➔ (16 + ${bit1 + borrow}) - ${bit2} = ${(16 + bit1) - bit2} (${((16 + bit1) - bit2).toString(16).toUpperCase()})`);
                        borrow = 1;
                    } else {
                        subLogicNotes.unshift(`Column ${idx} (16<sup>${idx}</sup>): ${hexChar1}(${bit1}) - ${hexChar2}(${bit2}) = ${bit1 - bit2} (${(bit1 - bit2).toString(16).toUpperCase()})`);
                        borrow = 0;
                    }
                }
            }

            html += `<table class="trace-table">`;
            html += `<tr><td></td>`;
            colPlaceValues.forEach(v => html += `<td style="color: #64748b; font-size:0.8rem;">${v}</td>`);
            html += `</tr>`;

            html += `<tr style="color: #00c6ff; font-weight: bold;"><td></td>`;
            colPowers.forEach(p => html += `<td>${p}</td>`);
            html += `</tr>`;

            if (operator === '+') {
                html += `<tr style="color: #ff6b6b; font-size: 0.85rem;"><td style="text-align:left; color:#475569;">Carry:</td>`;
                carryRow.forEach(c => html += `<td>${c ? c : ''}</td>`);
                html += `</tr>`;
            }

            html += `<tr><td style="text-align:left; color:#64748b;">Value 1:</td>`;
            for(let b of paddedOp1) html += `<td>${b}</td>`;
            html += `</tr>`;

            html += `<tr><td style="text-align:left; color:#00ff87;">${operator} Value 2:</td>`;
            for(let b of paddedOp2) html += `<td>${b}</td>`;
            html += `</tr>`;

            if (operator === '+') {
                html += `<tr class="row-line"><td style="text-align:left; color:#64748b; font-size:0.8rem;">Sum:</td>`;
                for(let i = 0; i < maxLength; i++) {
                    html += `<td style="font-size:0.85rem; color:#cbd5e1;">${intermediateSumRow[i]}</td>`;
                }
                html += `</tr>`;

                html += `<tr><td></td>`;
                for(let i = 0; i < maxLength; i++) {
                    html += `<td>${bubbleRow[i] ? '<span class="bubble-minus-sixteen">-16</span>' : ''}</td>`;
                }
                html += `</tr>`;
            } else {
                html += `<tr class="row-line"><td></td>`;
                for(let i = 0; i < maxLength; i++) html += `<td></td>`;
                html += `</tr>`;
            }

            html += `<tr class="row-double-line" style="font-weight:bold; color:#00ff87; font-size:1.1rem;"><td style="text-align:left;">Output:</td>`;
            for(let b of paddedRes) html += `<td>${b}</td>`;
            html += `</tr>`;
            html += `</table><br>`;

            html += `<span style="color: #64748b; font-weight: bold;">Step Logic Breakdown:</span><br>`;
            html += subLogicNotes.join('<br>') + `<br><br>`;
            html += `Step Evaluation Result: <strong>${resultHexStr}<sub>16</sub> (Decimal: ${resultDec}<sub>10</sub>)</strong><br>`;

            return {
                html: html,
                result: resultHexStr
            };
        }

        // Initialize display behavior on load based on screen size
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 992) {
                stepsPanel.style.maxHeight = "none";
            } else if (!stepsPanel.classList.contains('open')) {
                stepsPanel.style.maxHeight = null;
            }
        });
        if (window.innerWidth >= 992) {
            stepsPanel.classList.add('open');
            stepsPanel.style.maxHeight = "none";
        }
    </script>
