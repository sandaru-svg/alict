<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | A/L ICT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #070b12; /* Deep dark cosmic background */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            overflow-y: auto; /* Fixes clipping on smaller desktop monitors */
        }

        /* Main Content Container */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
            max-width: 1200px;
            padding: 20px 0;
        }

        /* Glowing Microchip Outer Circle */
        .icon-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(0, 242, 254, 0.3);
            background: rgba(7, 11, 18, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
            opacity: 0;
            transform: scale(0.3) rotate(-180deg);
            animation: popInIcon 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                       pulseGlow 2.5s ease-in-out infinite alternate 0.8s;
            transition: width 0.3s ease, height 0.3s ease;
        }

        .icon-circle svg {
            width: 50px;
            height: 50px;
            transition: width 0.3s ease, height 0.3s ease;
        }

        /* Welcome Text Styling */
        .welcome-text {
            margin-top: 35px;
            font-size: clamp(0.8rem, 2vw, 0.95rem); /* Dynamic resizing */
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #64748b;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease-out forwards 0.8s;
        }

        /* Main Title A/L ICT */
        .main-title {
            margin-top: 10px;
            font-size: clamp(2.8rem, 8vw, 4.8rem); /* Scales beautifully on PC */
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #00c6ff, #00ff87);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease-out forwards 1.1s;
            text-align: center;
        }

        /* Decorative Gradient Line underneath */
        .underline-bar {
            margin-top: 15px;
            width: clamp(80px, 10vw, 150px);
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(90deg, #00c6ff, #00ff87);
            box-shadow: 0 2px 10px rgba(0, 255, 135, 0.3);
            opacity: 0;
            transform: scaleX(0);
            animation: expandWidth 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 1.4s;
        }

        /* Action Button Container placed lower */
        .button-container {
            width: 100%;
            max-width: 380px;
            margin-top: clamp(50px, 8vh, 90px); /* Smart vertical layout spacing */
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease-out forwards 1.7s;
            padding: 0 10px;
        }

        /* Styled Hyperlink Button */
        .action-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 16px 32px;
            background: linear-gradient(90deg, #00c6ff, #00ff87);
            color: #070b12;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 198, 255, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }

        .action-btn svg {
            margin-left: 10px;
            transition: transform 0.3s ease;
        }

        /* Button Hover Effects */
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 255, 135, 0.4);
            letter-spacing: 1px;
        }

        .action-btn:hover svg {
            transform: translateX(5px);
        }

        .action-btn:active {
            transform: translateY(-1px);
        }

        /* Footer Copyright Styling */
        .custom-footer {
            text-align: center;
            font-size: 0.85rem;
            line-height: 1.6;
            letter-spacing: 0.8px;
            width: 100%;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards 2.0s;
            margin-top: 20px;
        }

        .custom-footer .cr-text {
            color: #475569;
            text-transform: lowercase;
            font-weight: 400;
        }

        .custom-footer .al-text {
            font-weight: 600;
            background: linear-gradient(90deg, #00c6ff, #00ff87);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- ANIMATIONS --- */
        
        /* Microchip Initial Entry Animation */
        @keyframes popInIcon {
            0% {
                opacity: 0;
                transform: scale(0.3) rotate(-180deg);
            }
            70% {
                transform: scale(1.1) rotate(10deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        /* Continuous Ambient Glow for Microchip */
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
                border-color: rgba(0, 242, 254, 0.4);
                transform: scale(1);
            }
            100% {
                box-shadow: 0 0 35px rgba(0, 255, 135, 0.45);
                border-color: rgba(0, 255, 135, 0.6);
                transform: scale(1.03);
            }
        }

        /* Elements Fade In and Slide Up */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Line Expand Animation */
        @keyframes expandWidth {
            to {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        /* Simple Fade In for Footer */
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* --- MEDIA QUERY FOR PC / DESKTOP SCREEN OPTIMIZATION --- */
        @media (min-width: 900px) {
            .main-container {
                gap: 5px; /* Tighter layout cohesion on wider monitors */
            }

            .icon-circle {
                width: 130px;
                height: 130px;
            }

            .icon-circle svg {
                width: 60px;
                height: 60px;
            }

            .welcome-text {
                margin-top: 45px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="icon-circle">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                <rect x="9" y="9" width="6" height="6"></rect>
                <line x1="9" y1="1" x2="9" y2="4"></line>
                <line x1="15" y1="1" x2="15" y2="4"></line>
                <line x1="9" y1="20" x2="9" y2="23"></line>
                <line x1="15" y1="20" x2="15" y2="23"></line>
                <line x1="20" y1="9" x2="23" y2="9"></line>
                <line x1="20" y1="15" x2="23" y2="15"></line>
                <line x1="1" y1="9" x2="4" y2="9"></line>
                <line x1="1" y1="15" x2="4" y2="15"></line>
            </svg>
        </div>

        <div class="welcome-text">Welcome To</div>
        <div class="main-title">A/L ICT</div>
        <div class="underline-bar"></div>

        <div class="button-container">
            <a href="index.html?visited=true" class="action-btn">
                Go to the home page
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>
        </div>
        
    </div>

    <div class="custom-footer">
        <p class="cr-text">@copyright - sandaru malisha</p>
        <p class="al-text">A/L ICT 2028</p>
    </div>

</body>
</html>
